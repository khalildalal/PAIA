<!DOCTYPE html>
<html lang="en" data-theme="{{ theme_mode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Probability AI Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script defer src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="login-body">

  <div class="login-layout">

    <!-- LEFT PANEL -->
    <section class="hero-panel glass-card">

      <div class="theme-panel">
        <button class="theme-btn" type="button" data-theme-choice="light">Light</button>
        <button class="theme-btn" type="button" data-theme-choice="dark">Dark</button>
        <button class="theme-btn" type="button" data-theme-choice="system">System</button>
      </div>

      <h1>Probability AI Assistant</h1>

      <!-- ✅ FIXED LINE (NO BREAK) -->
      <p class="login-signature">
        Maram Dalal | FYP | USJ - Faculty of Sciences | 2026
      </p>

      <div class="hero-glow"></div>

    </section>

    <!-- RIGHT PANEL -->
    <section class="auth-panel glass-card">

      <div class="auth-tabs">
        <button class="auth-tab active" type="button" data-target="login-form">Login</button>
        <button class="auth-tab" type="button" data-target="register-form">Register</button>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack compact">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form id="login-form" class="auth-form active" method="post">
        <input type="hidden" name="action" value="login">

        <label>Username
          <input type="text" name="username" required>
        </label>

        <label>Password
          <input type="password" name="password" required>
        </label>

        <button class="btn btn-primary btn-full" type="submit">Login</button>
      </form>

      <form id="register-form" class="auth-form" method="post">
        <input type="hidden" name="action" value="register">

        <label>New username
          <input type="text" name="new_username" required>
        </label>

        <label>New password
          <input type="password" name="new_password" required>
        </label>

        <button class="btn btn-primary btn-full" type="submit">Register</button>
      </form>

    </section>

  </div>

  <script>
    window.APP_THEME = "{{ theme_mode }}";

    document.querySelectorAll('.auth-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(x => x.classList.remove('active'));

        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });
  </script>

</body>
</html>
